repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Helm chart templates are Go templates, not valid YAML ({{- ... }}) — helm
        # lint/template validates them instead. check-yaml still covers values.yaml/Chart.yaml.
        exclude: ^deploy/helm/.*/templates/.*
      - id: check-added-large-files
      - id: check-merge-conflict
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
