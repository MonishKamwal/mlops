# Ephemeral EKS demo (PLAN.md §5 Phase 3, task 3).
#
# Once a month (and on demand) this stands up a real EKS cluster, deploys the exact image
# the Lambda tier is serving, smoke- and load-tests it, captures evidence, and DESTROYS
# everything — the whole point is ~$0 idle cost. The destroy step is `if: always()` so a
# failure still tears down; the separate eks-failsafe.yml (task 4) is the backstop for a
# cancelled run or a dead runner.
name: EKS demo

on:
  schedule:
    - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month (monthly, to conserve credits)
  workflow_dispatch:

permissions:
  id-token: write # OIDC assume-role for the ephemeral EKS role
  contents: read

# Shared group with eks-failsafe so cluster runs never overlap; queue rather than cancel
# (a cancelled apply/destroy could leave resources behind — the failsafe catches it, but
# don't invite it).
concurrency:
  group: eks-cluster
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_DIR: infra/ephemeral
  CLUSTER_NAME: quickdraw-ephemeral
  LAMBDA_FUNCTION_NAME: quickdraw-api
  RELEASE: quickdraw-api
  NAMESPACE: quickdraw

jobs:
  demo:
    runs-on: ubuntu-latest
    # The approval gate: configure the `eks-demo` environment with a required reviewer so
    # a cluster can never spin up (and spend credits) without a human clicking approve.
    environment: eks-demo
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.7"

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - uses: grafana/setup-k6-action@v1

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GHA_EKS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform apply (ephemeral cluster)
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      # if: always() + continue-on-error so that when the apply fails *after* the control
      # plane exists (e.g. a node group that never goes Ready), we can still point kubectl at
      # the cluster and let the capture step below dump node diagnostics before the destroy —
      # instead of flying blind. A genuinely absent cluster just makes this a no-op.
      - name: Configure kubectl
        if: always()
        continue-on-error: true
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Resolve the live image digest (what the Lambda tier serves)
        id: image
        run: |
          set -euo pipefail
          uri=$(aws lambda get-function --function-name "$LAMBDA_FUNCTION_NAME" \
            --query 'Code.ImageUri' --output text)
          echo "digest=${uri##*@}" >> "$GITHUB_OUTPUT"
          echo "Deploying image digest ${uri##*@}"

      # Install the monitoring stack BEFORE the API so its ServiceMonitor CRD exists when
      # the API chart renders with serviceMonitor.enabled=true. Values are trimmed for the
      # 3x t4g.small nodes (deploy/prometheus/values.yaml). The API dashboard is provisioned
      # as code: a labeled ConfigMap the Grafana sidecar auto-imports (searchNamespace: ALL).
      - name: Install kube-prometheus-stack + provision the API dashboard
        run: |
          set -euo pipefail
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
            --namespace monitoring --create-namespace \
            -f deploy/prometheus/values.yaml \
            --wait --timeout 12m
          kubectl -n monitoring create configmap quickdraw-api-dashboard \
            --from-file=deploy/grafana/dashboards/quickdraw-api.json \
            --dry-run=client -o yaml \
            | kubectl label --local -f - -o yaml grafana_dashboard=1 \
            | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install "$RELEASE" deploy/helm/quickdraw-api \
            --namespace "$NAMESPACE" --create-namespace \
            --set fullnameOverride="$RELEASE" \
            --set image.digest=${{ steps.image.outputs.digest }} \
            --set serviceMonitor.enabled=true \
            --wait --timeout 5m

      - name: Smoke test (via port-forward)
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" port-forward "svc/$RELEASE" 8080:80 >/dev/null 2>&1 &
          pf=$!
          trap 'kill $pf' EXIT
          for i in $(seq 1 15); do curl -fsS localhost:8080/healthz && break || sleep 3; done
          expected=$(curl -fsS localhost:8080/model-info | jq -r .model_sha256)
          echo "in-cluster model sha256: $expected"
          test -n "$expected"

      - name: k6 load test (via port-forward)
        run: |
          set -euo pipefail
          mkdir -p eks-evidence
          kubectl -n "$NAMESPACE" port-forward "svc/$RELEASE" 8080:80 >/dev/null 2>&1 &
          pf=$!
          trap 'kill $pf' EXIT
          sleep 5
          K6_WEB_DASHBOARD=true K6_WEB_DASHBOARD_EXPORT=eks-evidence/k6-report.html \
            k6 run deploy/k6/predict.js -e TARGET=http://localhost:8080

      # Best-effort (never fails the run): the k6 window just happened, so from=now-15m on the
      # dashboards shows the load spike. Prometheus targets prove the API ServiceMonitor is
      # actually scraped (health=up). api-metrics.json is the DATA CONTRACT — the raw metric
      # series behind the panels (RPS, latency percentiles, error rate, by-status, node CPU/mem)
      # so the portfolio site renders its own styled charts; the Grafana PNG is now just a dev
      # artifact. A renderer hiccup on the small nodes loses the PNG, not the run.
      - name: Capture monitoring evidence (metric-series data contract + PNG)
        if: always()
        run: |
          set +e
          mkdir -p eks-evidence
          kubectl -n monitoring port-forward svc/kube-prometheus-stack-prometheus 9090:9090 >/dev/null 2>&1 &
          pp=$!
          sleep 5
          curl -fsS "http://localhost:9090/api/v1/targets?state=active" -o eks-evidence/prometheus-targets.json
          python3 scripts/capture_prometheus_metrics.py --minutes 15 --out eks-evidence/api-metrics.json
          kill $pp 2>/dev/null
          kubectl -n monitoring port-forward svc/kube-prometheus-stack-grafana 3000:80 >/dev/null 2>&1 &
          gp=$!
          sleep 5
          curl -fsS "http://admin:prom-operator@localhost:3000/render/d/quickdraw-api/quickdraw-api?orgId=1&from=now-15m&to=now&width=1600&height=900&kiosk" \
            -o eks-evidence/grafana-quickdraw-api.png
          kill $gp 2>/dev/null
          echo "monitoring evidence capture done (best-effort)"

      - name: Capture cluster evidence
        if: always()
        run: |
          mkdir -p eks-evidence
          kubectl get pods -n monitoring -o wide > eks-evidence/monitoring-pods.txt 2>&1 || true
          # Node-level diagnostics first — on an apply failure these are the whole point:
          # `describe nodes` shows the NotReady conditions/taints, and the aws-node logs show
          # why the CNI didn't come up. On a healthy run they're just extra evidence.
          kubectl get nodes -o wide > eks-evidence/nodes.txt 2>&1 || true
          kubectl describe nodes > eks-evidence/nodes-describe.txt 2>&1 || true
          kubectl get pods -A -o wide > eks-evidence/pods.txt 2>&1 || true
          kubectl -n kube-system logs -l k8s-app=aws-node --tail=200 --all-containers > eks-evidence/aws-node.log 2>&1 || true
          kubectl get all -A -o wide > eks-evidence/resources.txt 2>&1 || true
          kubectl -n "$NAMESPACE" rollout history "deploy/$RELEASE" > eks-evidence/rollout.txt 2>&1 || true
          kubectl top nodes > eks-evidence/top-nodes.txt 2>&1 || true
          kubectl top pods -n "$NAMESPACE" > eks-evidence/top-pods.txt 2>&1 || true

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eks-demo-evidence
          path: eks-evidence/
          if-no-files-found: warn

      - name: Terraform destroy
        if: always()
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          terraform destroy -auto-approve -input=false
