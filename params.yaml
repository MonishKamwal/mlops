# Pipeline parameters — single source of truth, wired into DVC stages in Phase 2.
#
# NOTE: a class's position in this list IS its label index, in training and serving
# alike (see quickdraw/config.py). Append new classes at the end and retrain — never
# reorder or insert.
data:
  classes: # PLAN.md §1: visually distinct, drawable in under 10 seconds
    - airplane
    - apple
    - banana
    - bicycle
    - bird
    - car
    - cat
    - clock
    - dog
    - face
    - fish
    - house
    - star
    - tree
    - umbrella
  samples_per_class: 10000
  seed: 42
  splits:
    train: 0.8
    val: 0.1
    test: 0.1

training:
  epochs: 8
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.0001
  dropout: 0.3
  seed: 42

# Quality gate (PLAN.md §5 Phase 2 task 4): a freshly trained challenger ships only
# if it clears an absolute test-accuracy floor AND does not regress on the current
# champion by more than `epsilon`. Passing means "ship this challenger"; the `champion`
# alias moves only on a *strict* improvement, so it stays a non-eroding quality bar
# rather than a record of what's deployed (PLAN §5 task 4, amended 2026-07-20).
gate:
  min_test_accuracy: 0.85 # absolute floor — "good", not just "better than a bad champion"
  epsilon: 0.005 # 0.5pp of tolerated regression, so seed noise doesn't block deploys
